<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="aion-edu seal">
  <!-- wax-signet disc -->
  <circle cx="32" cy="32" r="31.5" fill="#f3eee0"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#9a7a35" stroke-width="2"/>
  <!-- chain-link nodes (the hash chain) -->
  <g fill="#9a7a35">
    <circle cx="58.0" cy="32.0" r="1.5"/><circle cx="54.5" cy="45.0" r="1.5"/>
    <circle cx="45.0" cy="54.5" r="1.5"/><circle cx="32.0" cy="58.0" r="1.5"/>
    <circle cx="19.0" cy="54.5" r="1.5"/><circle cx="9.5"  cy="45.0" r="1.5"/>
    <circle cx="6.0"  cy="32.0" r="1.5"/><circle cx="9.5"  cy="19.0" r="1.5"/>
    <circle cx="19.0" cy="9.5"  r="1.5"/><circle cx="32.0" cy="6.0"  r="1.5"/>
    <circle cx="45.0" cy="9.5"  r="1.5"/><circle cx="54.5" cy="19.0" r="1.5"/>
  </g>
  <!-- inner frame -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#8c3724" stroke-width="1.6"/>
  <!-- Æ monogram — the Aion + Edu ligature -->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="Palatino Linotype, Palatino, Georgia, serif" font-size="27" font-weight="700" fill="#8c3724">&#198;</text>
</svg>
